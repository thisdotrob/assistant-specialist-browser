# Standalone repo for the browser specialist. It is its own single-package
# workspace and depends on the platform crates by path (this crate and the
# products all sit side-by-side under the same parent directory).
[workspace]

[package]
name = "claw-specialist-browser"
version = "0.1.0"
edition = "2024"
license = "UNLICENSED"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
claw-core = { path = "../claw-platform/crates/claw-core" }
claw-capabilities = { path = "../claw-platform/crates/claw-capabilities" }
claw-agent-graph = { path = "../claw-platform/crates/claw-agent-graph" }
claw-specialist-spec = { path = "../claw-platform/crates/claw-specialist-spec" }
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
claw-db = { path = "../claw-platform/crates/claw-db" }
claw-session = { path = "../claw-platform/crates/claw-session" }
rusqlite = "0.32.1"
serde_json = "1.0.149"
tempfile = "3.27.0"
